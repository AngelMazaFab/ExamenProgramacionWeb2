<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGEP — Sistema Inteligente de Gestión de Estacionamientos</title>
  <meta name="description"
    content="SIGEP - Plataforma web centralizada de gestión de estacionamientos para UrbanPark S.A.">
</head>

<body>
  <script type="module">
    // Punto de entrada: redirige según el estado de autenticación.
    import { auth } from "/js/firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (user) {
        location.href = "/dashboard.html";
      } else {
        location.href = "/login.html";
      }
    });
  </script>
  <p style="font-family:sans-serif;text-align:center;margin-top:3rem;">Cargando SIGEP...</p>
</body>

</html>
