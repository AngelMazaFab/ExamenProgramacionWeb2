<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGEP — Reportes Financieros</title>
  <meta name="description" content="Reportes financieros filtrados con exportación a Excel (XLSX) en el sistema SIGEP.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="site">
  <div id="layout-header"></div>
  <div id="layout-nav"></div>

  <main>
    <!-- PÁGINA 8: REPORTES FINANCIEROS -->
    <section id="pagina-reportes" class="bay">
      <span class="bay-tag">P-08</span>
      <h2>Reportes Financieros</h2>

      <form id="form-filtros" action="#" method="get" novalidate>
        <fieldset>
          <legend>Filtros de Búsqueda</legend>

          <label for="fecha_inicio">Fecha inicio</label>
          <input type="date" id="fecha_inicio" name="fecha_inicio">

          <label for="fecha_fin">Fecha fin</label>
          <input type="date" id="fecha_fin" name="fecha_fin">

          <label for="turno_filtro">Turno</label>
          <select id="turno_filtro" name="turno_filtro">
            <option value="todos">Todos</option>
            <option value="matutino">Matutino</option>
            <option value="vespertino">Vespertino</option>
            <option value="nocturno">Nocturno</option>
          </select>

          <label for="metodo_pago_filtro">Método de pago</label>
          <select id="metodo_pago_filtro" name="metodo_pago_filtro">
            <option value="todos">Todos</option>
            <option value="efectivo">Efectivo</option>
            <option value="tarjeta">Tarjeta</option>
            <option value="app">App</option>
          </select>

          <button type="submit" id="btn-filtrar">Filtrar</button>
        </fieldset>
      </form>

      <div id="resumen-reporte" style="margin:1rem 0;font-family:var(--font-mono);font-size:0.9rem"></div>

      <table>
        <caption>Histórico de Tickets Filtrado</caption>
        <thead>
          <tr>
            <th>Ticket</th>
            <th>Fecha</th>
            <th>Placa</th>
            <th>Turno Operador</th>
            <th>Método de Pago</th>
            <th>Tiempo (min)</th>
            <th>Monto</th>
          </tr>
        </thead>
        <tbody id="tabla-reportes">
          <tr><td colspan="7">Aplica los filtros para ver resultados.</td></tr>
        </tbody>
      </table>

      <button type="button" id="btn-exportar-xlsx" class="btn" style="margin-top:1rem">
        ⬇ Exportar a Excel (XLSX)
      </button>
    </section>
  </main>

  <div id="layout-footer"></div>

  <!-- SheetJS para exportación XLSX en el navegador -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/auth-guard.js"></script>
  <script type="module" src="/js/views/reportes.js"></script>
</body>
</html>
