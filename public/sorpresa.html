<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGEP — Requerimientos Sorpresa</title>
  <meta name="description" content="Módulo de requerimientos sorpresa del sistema SIGEP de UrbanPark S.A.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="site">
  <div id="layout-header"></div>
  <div id="layout-nav"></div>

  <main>
    <!-- PÁGINA 15: REQUERIMIENTOS SORPRESA -->
    <section id="pagina-sorpresa" class="bay">
      <span class="bay-tag">P-15</span>
      <h2>Requerimientos Sorpresa</h2>

      <article>
        <h3>Resultados de la Encuesta de Satisfacción</h3>
        <table style="width:100%; border-collapse:collapse;">
          <thead>
            <tr>
              <th>Calificación</th>
              <th>Propietario</th>
              <th>Auto Placas</th>
              <th>Lugar Estacionamiento</th>
              <th>Tiempo</th>
              <th>Operador</th>
            </tr>
          </thead>
          <tbody id="tabla-encuestas">
            <tr><td colspan="6">Cargando resultados...</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </main>

  <div id="layout-footer"></div>

  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/auth-guard.js"></script>
  <script type="module" src="/js/views/sorpresa.js"></script>
</body>
</html>
