<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGEP — Buscador Rápido por Placa</title>
  <meta name="description" content="Búsqueda en tiempo real de vehículos por placa en el sistema SIGEP.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="site">
  <div id="layout-header"></div>
  <div id="layout-nav"></div>

  <main>
    <!-- PÁGINA 3: BUSCADOR RÁPIDO POR PLACA -->
    <section id="pagina-buscador" class="bay">
      <span class="bay-tag">P-03</span>
      <h2>Buscador Rápido por Placa</h2>
      <form id="form-busqueda" action="#" method="get" novalidate>
        <label for="placa-busqueda">Placa del vehículo</label>
        <input type="text" id="placa-busqueda" name="placa" placeholder="Ej. ABC-1234" autocomplete="off" style="text-transform:uppercase">
        <button type="submit">Buscar</button>
      </form>

      <article id="resultado-busqueda" style="display:none">
        <h3>Resultado de Búsqueda</h3>
        <div id="resultado-contenido"></div>
      </article>
    </section>
  </main>

  <div id="layout-footer"></div>

  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/auth-guard.js"></script>
  <script type="module" src="/js/views/buscador.js"></script>
</body>
</html>
